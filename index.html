<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WONG CINO PALEMBANG</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    font-family:'Comic Sans MS', cursive, sans-serif;
    background:linear-gradient(
        135deg,
        #ff9a9e,
        #fad0c4,
        #fbc2eb,
        #a6c1ee
    );
    background-size:400% 400%;
    animation:bgMove 10s ease infinite;
}

.container{
    text-align:center;
}

.title{
    font-size:5rem;
    font-weight:bold;
    color:white;
    text-shadow:
        4px 4px 0 #ff6b6b,
        8px 8px 0 #4ecdc4;
    animation:bounce 2s infinite;
}

.subtitle{
    margin-top:15px;
    font-size:1.5rem;
    color:#fff;
    animation:blink 1.5s infinite;
}

.emoji{
    position:absolute;
    font-size:2rem;
    animation:float 8s linear infinite;
}

.emoji:nth-child(1){
    left:10%;
    animation-delay:0s;
}
.emoji:nth-child(2){
    left:30%;
    animation-delay:2s;
}
.emoji:nth-child(3){
    left:50%;
    animation-delay:4s;
}
.emoji:nth-child(4){
    left:70%;
    animation-delay:1s;
}
.emoji:nth-child(5){
    left:90%;
    animation-delay:3s;
}

@keyframes bounce{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-20px);
    }
}

@keyframes blink{
    50%{
        opacity:0.4;
    }
}

@keyframes float{
    from{
        top:110%;
        transform:rotate(0deg);
    }
    to{
        top:-20%;
        transform:rotate(360deg);
    }
}

@keyframes bgMove{
    0%{
        background-position:0% 50%;
    }
    50%{
        background-position:100% 50%;
    }
    100%{
        background-position:0% 50%;
    }
}
</style>
</head>

<body>

<div class="emoji">🎉</div>
<div class="emoji">🥳</div>
<div class="emoji">🐼</div>
<div class="emoji">🎈</div>
<div class="emoji">😎</div>

<div class="container">
    <h1 class="title">WONG CINO PALEMBANG</h1>
    <div class="subtitle">✨ Mantap Nian! ✨</div>
</div>

</body>
</html>
