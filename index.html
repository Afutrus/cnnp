<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduAI Indonesia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>📚 EduAI Indonesia</h1>
        <p>Belajar Lebih Mudah Dengan AI</p>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h2>Guru AI 24 Jam</h2>
        <p>Tanyakan apa saja seputar pelajaran sekolah.</p>
    </div>
</section>

<section class="subjects">
    <div class="container">
        <h2>Mata Pelajaran</h2>

        <div class="cards">
            <div class="card">📐 Matematika</div>
            <div class="card">🧪 IPA</div>
            <div class="card">🌎 IPS</div>
            <div class="card">🇮🇩 Bahasa Indonesia</div>
            <div class="card">🇬🇧 Bahasa Inggris</div>
            <div class="card">💻 Pemrograman</div>
        </div>
    </div>
</section>

<section class="chat-section">
    <div class="container">

        <h2>🤖 EduAI Assistant</h2>

        <div id="chat-box"></div>

        <div class="chat-input">
            <textarea id="message" placeholder="Tanyakan sesuatu..."></textarea>
            <button onclick="sendMessage()">Kirim</button>
        </div>

    </div>
</section>

<footer>
    <p>© 2026 EduAI Indonesia</p>
</footer>

<script src="script.js"></script>
</body>
</html>
